<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IECnet Pulse - Global Referral Map</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: #ffffff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; width: 1100px; }
        .legend { display: flex; gap: 30px; margin-bottom: 20px; font-size: 16px; color: #334155; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        #tip { 
            display: none; position: fixed; background: white; border: 1px solid #94a3b8; 
            border-radius: 12px; padding: 15px; font-size: 14px; pointer-events: none; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 9999; line-height: 1.6;
        }
        canvas { background: #ffffff; border-radius: 8px; cursor: crosshair; display: block; margin: 0 auto; }
        .footer-note { margin-top: 25px; font-size: 13px; color: #64748b; line-height: 1.6; border-top: 1px solid #f1f5f9; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="legend">
      <span><strong>Total Referrals: 81</strong></span>
      <span><strong>● Node Size:</strong> Activity</span>
      <span><strong>— Line:</strong> Referral Path</span>
    </div>
    
    <canvas id="net" width="1050" height="850"></canvas>
    <div id="tip"></div>

    <div class="footer-note">
        These data reflect the referrals communicated by IECnet member firms in the WhatsApp group “IECnet Pulse.”<br>
        The referrals covered by this map span the period from October 2025 to March 2026.
    </div>
</div>

<script>
const countryData = {
  "Argentina": {flag:"🇦🇷", x:180, y:750, color: "#3b82f6"},
  "Australia": {flag:"🇦🇺", x:950, y:720, color: "#6366f1"},
  "Belgium": {flag:"🇧🇪", x:430, y:120, color: "#a855f7"},
  "Bolivia": {flag:"🇧🇴", x:100, y:540, color: "#2dd4bf"},
  "Brazil": {flag:"🇧🇷", x:280, y:650, color: "#64748b"},
  "China": {flag:"🇨🇳", x:850, y:220, color: "#f87171"},
  "Cyprus": {flag:"🇨🇾", x:700, y:360, color: "#9333ea"},
  "Egypt": {flag:"🇪🇬", x:620, y:480, color: "#4f46e5"},
  "France": {flag:"🇫🇷", x:450, y:350, color: "#3b82f6"},
  "Germany": {flag:"🇩🇪", x:580, y:180, color: "#eab308"},
  "Greece": {flag:"🇬🇷", x:640, y:320, color: "#67e8f9"},
  "India": {flag:"🇮🇳", x:800, y:430, color: "#0ea5e9"},
  "Indonesia": {flag:"🇮🇩", x:900, y:550, color: "#4338ca"},
  "Italy": {flag:"🇮🇹", x:580, y:400, color: "#f97316"},
  "Japan": {flag:"🇯🇵", x:950, y:280, color: "#fb923c"},
  "Kazakhstan": {flag:"🇰🇿", x:750, y:150, color: "#d946ef"},
  "Kenya": {flag:"🇰🇪", x:650, y:600, color: "#84cc16"},
  "Luxembourg": {flag:"🇱🇺", x:520, y:120, color: "#0f172a"},
  "Malaysia": {flag:"🇲🇾", x:800, y:520, color: "#0891b2"},
  "Malta": {flag:"🇲🇹", x:550, y:480, color: "#f97316"},
  "Mauritius": {flag:"🇲🇺", x:750, y:700, color: "#475569"},
  "Mexico": {flag:"🇲🇽", x:80, y:320, color: "#f43f5e"},
  "Morocco": {flag:"🇲🇦", x:320, y:480, color: "#06b6d4"},
  "Oman": {flag:"🇴🇲", x:750, y:460, color: "#ef4444"},
  "Peru": {flag:"🇵🇪", x:120, y:450, color: "#fbbf24"},
  "Portugal": {flag:"🇵🇹", x:240, y:420, color: "#14b8a6"},
  "Romania": {flag:"🇷🇴", x:700, y:250, color: "#f87171"},
  "Saudi Arabia": {flag:"🇸🇦", x:680, y:400, color: "#94a3b8"},
  "Senegal": {flag:"🇸🇳", x:350, y:580, color: "#10b981"},
  "Singapore": {flag:"🇸🇬", x:850, y:500, color: "#ec4899"},
  "Spain": {flag:"🇪🇸", x:350, y:320, color: "#f59e0b"},
  "Switzerland": {flag:"🇨🇭", x:500, y:250, color: "#ef4444"},
  "The Netherlands": {flag:"🇳🇱", x:400, y:80, color: "#fdba74"},
  "Tunisia": {flag:"🇹🇳", x:480, y:550, color: "#fbbf24"},
  "UAE": {flag:"🇦🇪", x:710, y:440, color: "#1e1b4b"},
  "UK": {flag:"🇬🇧", x:330, y:180, color: "#10b981"},
  "USA": {flag:"🇺🇸", x:100, y:220, color: "#22c55e"},
  "Uruguay": {flag:"🇺🇾", x:350, y:750, color: "#22c55e"}
};

const rawEdges = [
    {f:"Switzerland", t:"Mauritius", w:1}, {f:"France", t:"Belgium", w:7}, {f:"Luxembourg", t:"France", w:1},
    {f:"France", t:"Mexico", w:2}, {f:"France", t:"Peru", w:1}, {f:"France", t:"Germany", w:3},
    {f:"Italy", t:"France", w:1}, {f:"France", t:"Morocco", w:2}, {f:"France", t:"USA", w:1},
    {f:"France", t:"Japan", w:1}, {f:"France", t:"Kenya", w:1}, {f:"Germany", t:"Romania", w:2},
    {f:"Germany", t:"Greece", w:1}, {f:"Germany", t:"Morocco", w:1}, {f:"Germany", t:"UK", w:4},
    {f:"Morocco", t:"France", w:1}, {f:"Switzerland", t:"Switzerland", w:2}, {f:"Portugal", t:"Brazil", w:1},
    {f:"France", t:"Italy", w:2}, {f:"Tunisia", t:"Egypt", w:1}, {f:"France", t:"China", w:1},
    {f:"Switzerland", t:"Tunisia", w:1}, {f:"Tunisia", t:"France", w:1}, {f:"France", t:"Tunisia", w:1},
    {f:"Saudi Arabia", t:"UAE", w:1}, {f:"France", t:"Spain", w:3}, {f:"Portugal", t:"Switzerland", w:1},
    {f:"USA", t:"UK", w:2}, {f:"USA", t:"India", w:1}, {f:"Italy", t:"UK", w:2}, 
    {f:"India", t:"Malaysia", w:1}, {f:"India", t:"Cyprus", w:1}, {f:"Brazil", t:"The Netherlands", w:1}, 
    {f:"Singapore", t:"Indonesia", w:1}, {f:"France", t:"Luxembourg", w:1}, {f:"Switzerland", t:"France", w:1}, 
    {f:"France", t:"The Netherlands", w:1}, {f:"Switzerland", t:"Mexico", w:1}, {f:"France", t:"UK", w:3}, 
    {f:"France", t:"Switzerland", w:3}, {f:"Bolivia", t:"Uruguay", w:1}, {f:"Uruguay", t:"Brazil", w:1}, 
    {f:"Australia", t:"Brazil", w:1}, {f:"Australia", t:"Singapore", w:1}, {f:"France", t:"UAE", w:1}, 
    {f:"France", t:"Oman", w:1}, {f:"Germany", t:"Spain", w:1}, {f:"Spain", t:"Kazakhstan", w:1}, 
    {f:"France", t:"Portugal", w:2}, {f:"Germany", t:"Malta", w:1}, {f:"Germany", t:"Italy", w:2}, 
    {f:"France", t:"Mauritius", w:2}, {f:"Germany", t:"France", w:2}, {f:"Singapore", t:"USA", w:1}, 
    {f:"Portugal", t:"Germany", w:1}, {f:"USA", t:"Argentina", w:1}, {f:"France", t:"Senegal", w:1}
];

const stats = {};
Object.keys(countryData).forEach(k => stats[k] = {sent:0, recv:0});
rawEdges.forEach(e => {
    if(stats[e.f] && stats[e.t]) {
        stats[e.f].sent += e.w;
        stats[e.t].recv += e.w;
    }
});

const canvas = document.getElementById('net');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tip');
let hovered = null;

function draw() {
    ctx.clearRect(0, 0, 1050, 850);
    
    // Draw Lines
    rawEdges.forEach(e => {
        try {
            const na = countryData[e.f];
            const nb = countryData[e.t];
            if(!na || !nb) return;
            const isH = (hovered === e.f || hovered === e.t);
            ctx.beginPath();
            if(e.f === e.t) ctx.arc(na.x-25, na.y-25, 15, 0, Math.PI*2);
            else { ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y); }
            ctx.strokeStyle = isH ? 'rgba(15, 23, 42, 0.9)' : 'rgba(203, 213, 225, 0.4)';
            ctx.lineWidth = isH ? e.w * 3.5 : e.w * 1.5;
            ctx.stroke();
        } catch(err) { console.error(err); }
    });

    // Draw Nodes
    Object.keys(countryData).forEach(name => {
        try {
            const c = countryData[name];
            const r = 16 + Math.sqrt(stats[name].sent + stats[name].recv) * 5;
            const isH = (hovered === name);
            ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2);
            ctx.fillStyle = c.color; ctx.globalAlpha = isH ? 1.0 : 0.8; ctx.fill();
            ctx.globalAlpha = 1.0; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = isH ? "#0f172a" : "#475569";
            ctx.font = isH ? "bold 16px Arial" : "14px Arial";
            ctx.textAlign = "center"; ctx.fillText(c.flag + " " + name, c.x, c.y + r + 22);
        } catch(err) { console.error(err); }
    });
}

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (1050 / rect.width);
    const my = (e.clientY - rect.top) * (850 / rect.height);
    let found = null;
    Object.keys(countryData).forEach(name => {
        const r = 16 + Math.sqrt(stats[name].sent + stats[name].recv) * 5;
        if (Math.hypot(countryData[name].x - mx, countryData[name].y - my) < r + 10) found = name;
    });
    if (found !== hovered) { hovered = found; draw(); }
    if (found) {
        tip.innerHTML = `<strong>${countryData[found].flag} ${found}</strong><br>Sent: ${stats[found].sent}<br>Received: ${stats[found].recv}`;
        tip.style.display = 'block'; tip.style.left = (e.clientX + 15) + 'px'; tip.style.top = (e.clientY - 15) + 'px';
    } else tip.style.display = 'none';
});

draw();
</script>
</body>
</html>
